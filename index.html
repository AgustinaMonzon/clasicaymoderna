<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clásica & Moderna | Turnos</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="booking-card">
      <div class="header-image-container">
        <img src="logo.jpg" alt="Elvio Monzón" class="main-photo" />
        <div class="fade-overlay"></div>
      </div>

      <header>
        <h1>Clásica & Moderna</h1>
        <p class="subtitle">Peluquería Masculina</p>
      </header>

      <section class="info-box">
        <p>📍 Pringles 272, Victoria, Entre Ríos</p>
        <p>🗓️ Atención únicamente con turno previo</p>
      </section>

      <section class="booking-form">
        <h3>Reserva tu Turno</h3>

        <div class="form-group">
          <label for="dia">Seleccioná el día:</label>
          <select id="dia"></select>
        </div>

        <div class="form-group">
          <label for="hora">Horario disponible:</label>
          <select id="hora"></select>
        </div>

        <button id="btnWhatsapp" onclick="enviarTurno()">
          <img
            src="https://cdn-icons-png.flaticon.com/512/733/733585.png"
            width="20"
            alt="ws"
          />
          Agendar por WhatsApp
        </button>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
